services:
  service-1:
    build:
      context: .
    container_name: lab1-service-1
    environment:
      SERVICE_NAME: service-1
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
    ports:
      - "8081:8000"

  service-2:
    build:
      context: .
    container_name: lab1-service-2
    environment:
      SERVICE_NAME: service-2
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
    ports:
      - "8082:8000"

  redis:
    image: redis:7.4-alpine
    container_name: lab1-redis

  nginx:
    image: nginx:1.27-alpine
    container_name: lab1-nginx
    depends_on:
      - service-1
      - service-2
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
